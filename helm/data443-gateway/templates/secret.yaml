apiVersion: v1
kind: Secret
metadata:
  name: {{ include "data443-gateway.fullname" . }}
  labels:
    {{- include "data443-gateway.labels" . | nindent 4 }}
type: Opaque
stringData:
  # PostgreSQL
  {{- if .Values.externalPostgresql.enabled }}
  POSTGRES_PASSWORD: {{ .Values.externalPostgresql.password | quote }}
  {{- else }}
  POSTGRES_PASSWORD: {{ .Values.postgresql.auth.password | quote }}
  {{- end }}
  # Redis (empty = no AUTH; bundled chart: set redis.auth.enabled true + password to require AUTH)
  REDIS_PASSWORD: {{ include "data443-gateway.redisPassword" . | quote }}
  # Proxy API key
  PROXY_API_KEY: {{ .Values.gateway.proxyApiKey | quote }}
  # Admin API key
  ADMIN_API_KEY: {{ .Values.gateway.admin.apiKey | quote }}
  # JWT secret
  JWT_SECRET: {{ .Values.gateway.jwt.secret | quote }}
  # Cyren API key
  CYREN_API_KEY: {{ .Values.gateway.cyren.apiKey | quote }}
  # LLM API key (fallback)
  LLM_API_KEY: {{ .Values.gateway.llm.apiKey | quote }}
  # Control plane API key
  CONTROL_PLANE_API_KEY: {{ .Values.gateway.controlPlane.apiKey | quote }}
  CONTROL_PLANE_HITL_CONTINUATION_SECRET: {{ .Values.gateway.controlPlane.hitlContinuationSecret | quote }}
