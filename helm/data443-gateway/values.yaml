# -----------------------------------------------------------------
# Data443 LLM Security Gateway — Helm Values
# -----------------------------------------------------------------
# Required values you MUST set before deploying:
#   - postgresql.auth.password
#   - redis.auth.password
#   - gateway.proxyApiKey
#   - gateway.controlPlane.apiKey   (if control plane is enabled)
#   - gateway.controlPlane.url      (if control plane is enabled)
# -----------------------------------------------------------------

# -- Number of gateway replicas
replicaCount: 1

image:
  repository: ghcr.io/data443/data443-llm-gateway
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

# -- Gateway application settings
gateway:
  # Server
  logLevel: "INFO"
  logFormat: "json"
  workers: 2
  upstreamTimeoutSeconds: 60
  maxRequestBodyBytes: 10485760
  trustProxyHeaders: true
  # Fail fast on insecure/invalid auth and control-plane startup config
  strictStartupValidation: true

  # Rate limiting
  rateLimit:
    enabled: true
    windowSeconds: 60
    storage: "redis"
    proxyRequests: 120
    adminRequests: 300

  # Proxy API key authentication (callers must send x-api-key header)
  proxyApiKeyEnabled: true
  # REQUIRED — set to a strong random value
  proxyApiKey: ""

  # Admin API hardening
  admin:
    authEnabled: true
    authMode: "api_key"
    apiKey: ""
    allowedIps: ""

  # JWT authentication (optional)
  jwt:
    enabled: false
    secret: ""
    issuer: "data443-gateway"
    audience: "data443-gateway"

  # Cyren threat intelligence
  cyren:
    iprepUrl: "https://try-now-ipreputation.data443.io/ctipd/iprep"
    urlfUrl: "https://try-now-urlcat.data443.io/ctwsd/websec"
    apiKey: ""
    timeout: 5.0
    retryAttempts: 2
    failClosed: true

  # LLM provider defaults (keys should be provided by callers via Authorization header)
  llm:
    provider: "openai"
    endpoint: "https://api.openai.com"
    apiKey: ""

  # Audit / retention
  audit:
    retentionDays: 90
    maskSensitiveFields: true
    redactMessageContent: false
    maxStringLength: 4000
    purgeEnabled: true
    purgeIntervalSeconds: 3600

  # Policy thresholds
  policy:
    allowThreshold: 80
    allowLogThreshold: 50
    constrainThreshold: 20

  # Circuit breaker
  circuitBreaker:
    failureThreshold: 5
    recoveryTimeout: 60

  # Agent governance
  agent:
    linkEnforcementEnabled: true
    a2aInteractionEnforcementEnabled: true
    interactionRetentionDays: 30

  # ------------------------------------------------------------------
  # Vaikora Control Plane Integration
  # ------------------------------------------------------------------
  controlPlane:
    enabled: false
    # REQUIRED when enabled — Vaikora backend URL (e.g. http://vaikora-backend:8000)
    url: ""
    # REQUIRED when enabled — Vaikora API key (vk_... from Settings page)
    apiKey: ""
    policySyncIntervalSeconds: 60
    auditPushIntervalSeconds: 30
    auditBatchSize: 50
    hitlPollIntervalSeconds: 5
    hitlTimeoutSeconds: 300
    requestTimeoutSeconds: 10

  # OpenTelemetry (optional)
  otel:
    enabled: false
    serviceName: "data443-llm-gateway"
    otlpEndpoint: ""

# ------------------------------------------------------------------
# PostgreSQL sub-chart (Bitnami)
# ------------------------------------------------------------------
postgresql:
  enabled: true
  auth:
    database: "data443_audit"
    username: "postgres"
    # REQUIRED — set a strong password
    password: ""
    existingSecret: ""
  primary:
    persistence:
      enabled: true
      size: 10Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

# Use an external PostgreSQL instead of the sub-chart
externalPostgresql:
  enabled: false
  host: ""
  port: 5432
  database: "data443_audit"
  username: "postgres"
  password: ""
  existingSecret: ""
  existingSecretKey: "password"

# ------------------------------------------------------------------
# Redis sub-chart (Bitnami)
# ------------------------------------------------------------------
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: true
    # REQUIRED — set a strong password
    password: ""
    existingSecret: ""
  master:
    persistence:
      enabled: true
      size: 2Gi
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 128Mi

# Use an external Redis instead of the sub-chart
externalRedis:
  enabled: false
  host: ""
  port: 6379
  password: ""
  existingSecret: ""
  existingSecretKey: "password"

# ------------------------------------------------------------------
# Service / Ingress
# ------------------------------------------------------------------
service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: gateway.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

# ------------------------------------------------------------------
# Resources / Probes / Autoscaling
# ------------------------------------------------------------------
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL
