name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Dependency consistency check
        run: |
          pip check

      - name: Dependency vulnerability scan
        run: |
          pip install pip-audit==2.7.3
          pip-audit -r requirements.txt --progress-spinner off

      - name: Start gateway stack
        run: |
          set -euxo pipefail
          docker compose up -d --build

          ready=0
          for i in {1..90}; do
            if curl -fsS http://localhost:8000/health >/dev/null; then
              ready=1
              break
            fi
            sleep 2
          done

          docker compose ps

          if [ "$ready" -ne 1 ]; then
            echo "Gateway failed to become healthy. Printing logs..."
            docker compose logs gateway --tail=200 || true
            docker compose logs postgres --tail=120 || true
            docker compose logs redis --tail=120 || true
            exit 1
          fi

          curl -fsS http://localhost:8000/health

      - name: Run unit tests
        run: |
          python -m pytest -q --import-mode=importlib tests/py -o asyncio_default_fixture_loop_scope=function

      - name: Compile check
        run: |
          python -m compileall -q gateway

      - name: Build Docker image
        run: |
          docker build -t data443-llm-gateway:ci .

      - name: Teardown gateway stack
        if: always()
        run: |
          docker compose down -v
